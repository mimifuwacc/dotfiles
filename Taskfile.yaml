version: "3"

tasks:
  default:
    desc: "Show task list"
    cmds:
      - task --list

  open:dotfiles:
    desc: "Open dotfiles in editor"
    cmds:
      - code ~/dotfiles

  apply:
    desc: "Apply Nix configuration"
    silent: true
    vars:
      HOSTNAME:
        sh: hostname -s | tr '[:upper:]' '[:lower:]'
    cmds:
      - |
        TARGET="{{.CLI_ARGS}}"
        TARGET="${TARGET:-{{.HOSTNAME}}}"

        DIR="$HOME/dotfiles/system/darwin/$TARGET"

        if [ ! -d "$DIR" ]; then
          echo "Error: System config for \"$TARGET\" not found at $DIR"
          exit 1
        fi

        exec "$HOME/dotfiles/system/darwin/apply.sh" "$TARGET"

  apply:update:
    desc: "Update flake.lock and apply"
    silent: true
    cmds:
      - task: apply
        vars: { ARGS: "--update {{.CLI_ARGS}}" }

  dev:init:
    desc: "Initialize devbox & direnv"
    dir: "{{.USER_WORKING_DIR}}"
    silent: true
    cmds:
      - devbox init
      - devbox generate direnv -q
