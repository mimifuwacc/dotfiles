version: "3"

tasks:
  default:
    desc: "Show task list"
    cmds:
      - task --list

  open:dotfiles:
    desc: "Open dotfiles in editor"
    cmds:
      - code ~/dotfiles

  darwin:apply:
    desc: "Apply Nix configuration"
    silent: true
    cmds:
      - test "$(uname)" = "Darwin" || (echo "This task is only for macOS (Darwin)" && exit 1)
      - sudo --preserve-env=_USERNAME,_HOSTNAME darwin-rebuild switch --flake ~/dotfiles/nix/darwin --impure

  darwin:update:
    desc: "Update flake.lock and apply"
    silent: true
    cmds:
      - test "$(uname)" = "Darwin" || (echo "This task is only for macOS (Darwin)" && exit 1)
      - sudo chown -R $(whoami):staff ~/dotfiles/.git
      - sudo chown $(whoami):staff ~/dotfiles/nix/darwin/flake.lock 2>/dev/null || true
      - nix flake update --flake ~/dotfiles/nix/darwin
      - sudo --preserve-env=_USERNAME,_HOSTNAME darwin-rebuild switch --flake ~/dotfiles/nix/darwin --impure

  dev:init:
    desc: "Initialize devbox & direnv"
    dir: "{{.USER_WORKING_DIR}}"
    silent: true
    cmds:
      - devbox init
      - devbox generate direnv -q
