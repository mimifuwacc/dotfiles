version: "3"

tasks:
  default:
    desc: "Show task list"
    cmds:
      - task --list

  open:dotfiles:
    desc: "Open dotfiles in editor"
    cmds:
      - code ~/dotfiles

  apply:
    desc: "Apply Nix configuration"
    silent: true
    cmds:
      - ~/dotfiles/system/{{.CLI_ARGS}}/apply.sh

  update:
    desc: "Update flake.lock and apply"
    silent: true
    cmds:
      - ~/dotfiles/system/{{.CLI_ARGS}}/apply.sh --update

  dev:init:
    desc: "Initialize devbox & direnv"
    dir: "{{.USER_WORKING_DIR}}"
    silent: true
    cmds:
      - devbox init
      - devbox generate direnv -q
